<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mẫu bài học tương tác</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: transparent; }
        .card { transition: all 0.3s ease; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="p-8 flex items-center justify-center min-h-screen">
    <div class="bg-white rounded-2xl p-10 max-w-md w-full shadow-lg border border-teal-100 text-center">
        <div class="w-20 h-20 bg-teal-100 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-teal-600"><path d="M12 2v20"/><path d="m4.93 4.93 14.14 14.14"/><path d="M2 12h20"/><path d="m4.93 19.07 14.14-14.14"/></svg>
        </div>
        <h1 class="text-2xl font-bold text-gray-800 mb-2">Thí nghiệm ảo mẫu</h1>
        <p class="text-gray-600 mb-8">Đây là ví dụ về một bài học được viết bằng HTML thuần túy và nhúng vào ứng dụng chính.</p>
        
        <div class="space-y-4">
            <button onclick="sendResult(80)" class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-3 px-6 rounded-xl transition-colors">
                Hoàn thành (Đạt 80 điểm)
            </button>
            <button onclick="sendResult(100)" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-xl transition-colors">
                Hoàn thành (Đạt 100 điểm)
            </button>
        </div>

        <div id="status" class="mt-6 text-sm font-medium text-gray-500 italic">
            Chưa gửi kết quả...
        </div>
    </div>

    <script>
        function sendResult(score) {
            const status = document.getElementById('status');
            status.innerText = 'Đang gửi kết quả ' + score + '...';
            
            // Lấy ID bài học từ URL (nếu có)
            const urlParams = new URLSearchParams(window.location.search);
            const lessonId = urlParams.get('lessonId') || 'sample-id';

            const resultData = {
                type: 'SIMULATION_RESULT',
                lessonId: lessonId,
                score: score,
                details: {
                    completed: true,
                    timestamp: Date.now(),
                    message: "Người dùng đã tương tác với thí nghiệm mẫu"
                }
            };

            // Gửi thông điệp lên window cha (React App)
            window.parent.postMessage(resultData, window.location.origin);
            
            setTimeout(() => {
                status.innerText = 'Đã gửi kết quả thành công!';
                status.classList.remove('text-gray-500');
                status.classList.add('text-green-600');
            }, 500);
        }
    </script>
</body>
</html>
