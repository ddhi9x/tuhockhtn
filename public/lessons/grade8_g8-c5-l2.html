<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KHTN 8: Bài 22 - Mạch điện đơn giản</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Be Vietnam Pro', sans-serif; }
        
        @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fade-in 0.4s ease-out forwards; }
        
        @keyframes scale-in { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .animate-scale-in { animation: scale-in 0.3s ease-out forwards; }

        @keyframes flowAnim { from { stroke-dashoffset: 24; } to { stroke-dashoffset: 0; } }
        .current-flow { stroke-dasharray: 12 12; animation: flowAnim 0.8s linear infinite; }
        .glow { filter: drop-shadow(0 0 8px rgba(250, 204, 21, 0.8)); }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            });
            return <i data-lucide={name} width={size} height={size} className={className}></i>;
        };

        // --- Dữ liệu bài học ---
        const lessonData = {
            title: "Bài 22: Mạch điện đơn giản",
            teacher: "Giáo viên bộ môn",
            classInfo: "Khoa học Tự nhiên 8",
            quiz: [
                { id: 1, question: "Mạch điện kín là mạch điện:", options: ["A. Không có nguồn điện.", "B. Các thiết bị được nối với nhau nhưng không khép kín.", "C. Dòng điện có thể chạy qua một cách liên tục từ cực dương sang cực âm của nguồn.", "D. Chỉ có công tắc đang mở."], correct: 2, explain: "Mạch kín tạo thành một vòng liên tục cho dòng điện chạy qua." },
                { id: 2, question: "Theo quy ước, chiều dòng điện là chiều:", options: ["A. Đi từ cực dương qua dây dẫn tới cực âm của nguồn điện.", "B. Đi từ cực âm qua dây dẫn tới cực dương của nguồn điện.", "C. Đi từ thiết bị điện về nguồn điện.", "D. Cùng chiều với sự dịch chuyển của electron tự do."], correct: 0, explain: "Quy ước: Dòng điện đi từ cực dương (+) qua dây dẫn và thiết bị điện tới cực âm (-) của nguồn điện." },
                { id: 3, question: "Khi công tắc (khoá K) trong mạch đang mở, điều gì xảy ra?", options: ["A. Mạch điện trở thành mạch kín, đèn sáng.", "B. Mạch điện hở, dòng điện không thể chạy qua.", "C. Cường độ dòng điện tăng lên đột ngột.", "D. Dòng điện chạy ngược chiều."], correct: 1, explain: "Công tắc mở tạo ra khoảng trống, làm đứt đoạn đường đi của dòng điện (mạch hở)." }
            ],
            advancedExercises: [
                {
                    id: 1,
                    question: "Trong đèn pin, ta thường thấy 2 hoặc 3 viên pin được ghép liên tiếp với nhau (cực dương của pin này nối với cực âm của pin kia). Hãy giải thích mục đích của việc ghép nối này.",
                    hint: "Hiệu điện thế của 1 viên pin thường là 1.5V. Bóng đèn pin cần mức điện áp cao hơn để sáng rõ.",
                    answer: "Để tăng hiệu điện thế cung cấp cho bóng đèn.",
                    details: "Việc ghép nối tiếp nhiều viên pin giúp tăng tổng hiệu điện thế (điện áp) cung cấp cho mạch. \nVí dụ: 2 viên pin 1.5V ghép nối tiếp sẽ tạo ra nguồn 3.0V, giúp đèn sáng mạnh hơn và hoạt động đúng công suất thiết kế."
                },
                {
                    id: 2,
                    question: "Cho các dụng cụ điện gồm: 2 pin mắc nối tiếp, 1 công tắc đóng, 1 bóng đèn và dây dẫn. Hãy vẽ sơ đồ mạch điện và xác định chiều dòng điện chạy trong mạch.",
                    hint: "Dùng các kí hiệu tương ứng trong Bảng kí hiệu để vẽ. Chú ý vẽ mũi tên chỉ chiều dòng điện từ cực dương sang cực âm.",
                    answer: "Mạch kín sáng đèn, dòng điện chạy từ cực dương sang cực âm.",
                    details: "Các bước thực hiện:\n1. Vẽ kí hiệu nguồn điện 2 pin nối tiếp.\n2. Vẽ kí hiệu công tắc đóng, bóng đèn.\n3. Nối các linh kiện bằng dây dẫn tạo thành vòng kín.\n4. Vẽ mũi tên chỉ chiều dòng điện từ cực dương (+) đi ra, đi qua công tắc, bóng đèn và trở về cực âm (-).",
                    svg: (
                        <svg viewBox="0 0 300 200" className="w-full max-w-md mx-auto mt-4 border-2 border-emerald-200 bg-white rounded-xl p-4 shadow-sm">
                            <line x1="50" y1="50" x2="130" y2="50" stroke="#334155" strokeWidth="3"/>
                            <line x1="170" y1="50" x2="250" y2="50" stroke="#334155" strokeWidth="3"/>
                            <line x1="50" y1="50" x2="50" y2="150" stroke="#334155" strokeWidth="3"/>
                            <line x1="250" y1="50" x2="250" y2="150" stroke="#334155" strokeWidth="3"/>
                            <line x1="50" y1="150" x2="100" y2="150" stroke="#334155" strokeWidth="3"/>
                            <line x1="130" y1="150" x2="180" y2="150" stroke="#334155" strokeWidth="3"/>
                            <line x1="220" y1="150" x2="250" y2="150" stroke="#334155" strokeWidth="3"/>
                            
                            <line x1="130" y1="35" x2="130" y2="65" stroke="#ef4444" strokeWidth="2"/>
                            <line x1="140" y1="42" x2="140" y2="58" stroke="#3b82f6" strokeWidth="4"/>
                            <line x1="140" y1="50" x2="160" y2="50" stroke="#334155" strokeWidth="3"/>
                            <line x1="160" y1="35" x2="160" y2="65" stroke="#ef4444" strokeWidth="2"/>
                            <line x1="170" y1="42" x2="170" y2="58" stroke="#3b82f6" strokeWidth="4"/>
                            <text x="120" y="30" fill="#ef4444" fontSize="14" fontWeight="bold">+</text>
                            <text x="175" y="30" fill="#3b82f6" fontSize="14" fontWeight="bold">-</text>

                            <circle cx="100" cy="150" r="3" fill="#334155"/>
                            <circle cx="130" cy="150" r="3" fill="#334155"/>
                            <line x1="100" y1="150" x2="130" y2="150" stroke="#334155" strokeWidth="3"/>
                            <text x="110" y="135" fill="#64748b" fontSize="14" fontWeight="bold">K</text>

                            <circle cx="200" cy="150" r="16" fill="#fef08a" stroke="#334155" strokeWidth="3" className="glow"/>
                            <path d="M 189 139 L 211 161 M 211 139 L 189 161" stroke="#334155" strokeWidth="2"/>
                            <text x="200" y="185" fill="#64748b" fontSize="14" fontWeight="bold" textAnchor="middle">Đ</text>

                            <g stroke="#ef4444" strokeWidth="3" fill="none">
                                {/* Dây trên: đi sang trái (từ cực dương) */}
                                <path d="M 80 50 L 100 40 L 100 60 Z" fill="#ef4444" stroke="none"/>
                                {/* Dây trái: đi xuống */}
                                <path d="M 50 110 L 40 90 L 60 90 Z" fill="#ef4444" stroke="none"/>
                                {/* Dây dưới: đi sang phải */}
                                <path d="M 170 150 L 150 140 L 150 160 Z" fill="#ef4444" stroke="none"/>
                                {/* Dây phải: đi lên */}
                                <path d="M 250 90 L 240 110 L 260 110 Z" fill="#ef4444" stroke="none"/>
                            </g>
                        </svg>
                    )
                }
            ]
        };

        // --- Các Component Thực Hành Tương Tác ---

        // Thực hành 1: Trò chơi nối nét Kí hiệu
        const MatchingGame = () => {
            const items = [
                { id: 'nguon1', label: 'Nguồn điện (1 Pin)', svg: <g><line x1="15" y1="25" x2="40" y2="25" stroke="#334155" strokeWidth="2"/><line x1="40" y1="10" x2="40" y2="40" stroke="#ef4444" strokeWidth="2"/><line x1="55" y1="18" x2="55" y2="32" stroke="#3b82f6" strokeWidth="4"/><line x1="55" y1="25" x2="85" y2="25" stroke="#334155" strokeWidth="2"/><text x="25" y="15" fill="#ef4444" fontSize="14" fontWeight="bold">+</text><text x="65" y="15" fill="#3b82f6" fontSize="14" fontWeight="bold">-</text></g> },
                { id: 'nguon2', label: 'Nguồn điện (2 Pin)', svg: <g><line x1="5" y1="25" x2="25" y2="25" stroke="#334155" strokeWidth="2"/><line x1="25" y1="10" x2="25" y2="40" stroke="#ef4444" strokeWidth="2"/><line x1="35" y1="18" x2="35" y2="32" stroke="#3b82f6" strokeWidth="4"/><line x1="35" y1="25" x2="55" y2="25" stroke="#334155" strokeWidth="2"/><line x1="55" y1="10" x2="55" y2="40" stroke="#ef4444" strokeWidth="2"/><line x1="65" y1="18" x2="65" y2="32" stroke="#3b82f6" strokeWidth="4"/><line x1="65" y1="25" x2="85" y2="25" stroke="#334155" strokeWidth="2"/></g> },
                { id: 'den', label: 'Bóng đèn', svg: <g><line x1="10" y1="25" x2="35" y2="25" stroke="#334155" strokeWidth="2"/><circle cx="50" cy="25" r="15" fill="none" stroke="#334155" strokeWidth="2"/><path d="M 39 14 L 61 36 M 61 14 L 39 36" stroke="#334155" strokeWidth="2"/><line x1="65" y1="25" x2="90" y2="25" stroke="#334155" strokeWidth="2"/></g> },
                { id: 'ct_mo', label: 'Công tắc mở', svg: <g><line x1="10" y1="25" x2="30" y2="25" stroke="#334155" strokeWidth="2"/><circle cx="35" cy="25" r="3" fill="#334155"/><circle cx="65" cy="25" r="3" fill="#334155"/><line x1="35" y1="25" x2="60" y2="10" stroke="#334155" strokeWidth="2"/><line x1="70" y1="25" x2="90" y2="25" stroke="#334155" strokeWidth="2"/></g> },
                { id: 'ct_dong', label: 'Công tắc đóng', svg: <g><line x1="10" y1="25" x2="30" y2="25" stroke="#334155" strokeWidth="2"/><circle cx="35" cy="25" r="3" fill="#334155"/><circle cx="65" cy="25" r="3" fill="#334155"/><line x1="35" y1="25" x2="65" y2="25" stroke="#334155" strokeWidth="2"/><line x1="70" y1="25" x2="90" y2="25" stroke="#334155" strokeWidth="2"/></g> },
                { id: 'dien_tro', label: 'Điện trở', svg: <g><line x1="10" y1="25" x2="25" y2="25" stroke="#334155" strokeWidth="2"/><rect x="25" y="15" width="50" height="20" fill="none" stroke="#334155" strokeWidth="2"/><line x1="75" y1="25" x2="90" y2="25" stroke="#334155" strokeWidth="2"/></g> },
                { id: 'ampe', label: 'Ampe kế', svg: <g><line x1="10" y1="25" x2="35" y2="25" stroke="#334155" strokeWidth="2"/><circle cx="50" cy="25" r="15" fill="none" stroke="#334155" strokeWidth="2"/><text x="50" y="30" fill="#334155" fontSize="14" fontWeight="bold" textAnchor="middle">A</text><line x1="65" y1="25" x2="90" y2="25" stroke="#334155" strokeWidth="2"/><text x="25" y="15" fill="#ef4444" fontSize="14" fontWeight="bold">+</text><text x="75" y="15" fill="#3b82f6" fontSize="14" fontWeight="bold">-</text></g> },
                { id: 'von', label: 'Vôn kế', svg: <g><line x1="10" y1="25" x2="35" y2="25" stroke="#334155" strokeWidth="2"/><circle cx="50" cy="25" r="15" fill="none" stroke="#334155" strokeWidth="2"/><text x="50" y="30" fill="#334155" fontSize="14" fontWeight="bold" textAnchor="middle">V</text><line x1="65" y1="25" x2="90" y2="25" stroke="#334155" strokeWidth="2"/><text x="25" y="15" fill="#ef4444" fontSize="14" fontWeight="bold">+</text><text x="75" y="15" fill="#3b82f6" fontSize="14" fontWeight="bold">-</text></g> },
                { id: 'led', label: 'Điôt phát quang', svg: <g><line x1="10" y1="30" x2="35" y2="30" stroke="#334155" strokeWidth="2"/><polygon points="35,20 35,40 55,30" fill="none" stroke="#334155" strokeWidth="2"/><line x1="55" y1="20" x2="55" y2="40" stroke="#334155" strokeWidth="2"/><line x1="55" y1="30" x2="80" y2="30" stroke="#334155" strokeWidth="2"/><line x1="45" y1="15" x2="55" y2="5" stroke="#334155" strokeWidth="2"/><polygon points="55,5 50,7 53,10" fill="#334155"/><line x1="55" y1="20" x2="65" y2="10" stroke="#334155" strokeWidth="2"/><polygon points="65,10 60,12 63,15" fill="#334155"/></g> },
                { id: 'chuong', label: 'Chuông điện', svg: <g><line x1="10" y1="25" x2="35" y2="25" stroke="#334155" strokeWidth="2"/><path d="M 35 25 Q 35 10 50 10 Q 65 10 65 25 Z" fill="none" stroke="#334155" strokeWidth="2"/><line x1="35" y1="25" x2="65" y2="25" stroke="#334155" strokeWidth="2"/><circle cx="50" cy="25" r="2" fill="#334155"/><line x1="65" y1="25" x2="90" y2="25" stroke="#334155" strokeWidth="2"/></g> }
            ];

            const [rightItems, setRightItems] = useState([]);
            const [connections, setConnections] = useState([]);
            const [activeLeft, setActiveLeft] = useState(null);
            const [activeRight, setActiveRight] = useState(null);
            const [submitted, setSubmitted] = useState(false);

            useEffect(() => {
                setRightItems([...items].sort(() => Math.random() - 0.5));
            }, []);

            const handleLeftClick = (index) => {
                if (submitted) return;
                if (connections.some(c => c.leftIndex === index)) {
                    setConnections(connections.filter(c => c.leftIndex !== index));
                    setActiveLeft(null);
                    return;
                }
                if (activeRight !== null) {
                    setConnections([...connections, { leftIndex: index, rightIndex: activeRight }]);
                    setActiveLeft(null);
                    setActiveRight(null);
                } else {
                    setActiveLeft(activeLeft === index ? null : index);
                }
            };

            const handleRightClick = (index) => {
                if (submitted) return;
                if (connections.some(c => c.rightIndex === index)) {
                    setConnections(connections.filter(c => c.rightIndex !== index));
                    setActiveRight(null);
                    return;
                }
                if (activeLeft !== null) {
                    setConnections([...connections, { leftIndex: activeLeft, rightIndex: index }]);
                    setActiveLeft(null);
                    setActiveRight(null);
                } else {
                    setActiveRight(activeRight === index ? null : index);
                }
            };

            const checkResults = () => setSubmitted(true);

            const resetGame = () => {
                setConnections([]); setActiveLeft(null); setActiveRight(null);
                setSubmitted(false); setRightItems([...items].sort(() => Math.random() - 0.5));
            };

            const isCorrect = (leftIndex, rightIndex) => items[leftIndex].id === rightItems[rightIndex].id;
            const score = connections.filter(c => isCorrect(c.leftIndex, c.rightIndex)).length;

            return (
                <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 mb-6 animate-fade-in">
                    <div className="flex items-center justify-between mb-4 border-b pb-3">
                        <div className="flex items-center gap-3">
                            <span className="bg-blue-100 text-blue-800 w-8 h-8 flex items-center justify-center rounded-lg font-bold">1</span>
                            <h3 className="text-xl font-bold text-gray-800">Trò chơi: Nối Kí hiệu</h3>
                        </div>
                        <button onClick={resetGame} className="text-sm bg-gray-100 hover:bg-gray-200 px-3 py-1 rounded font-bold transition-colors">Đảo lại</button>
                    </div>
                    <p className="text-gray-600 mb-4 text-sm font-medium">Nhấn chọn một kí hiệu bên trái và một tên gọi bên phải để tạo nét nối ngang.</p>
                    
                    <div className="overflow-x-auto custom-scrollbar pb-4 bg-slate-50 p-4 rounded-xl border border-slate-200">
                        <div className="min-w-[600px] flex w-full relative h-[720px] select-none">
                            {/* Left Column */}
                            <div className="w-[35%] flex flex-col justify-between h-full z-10">
                                {items.map((item, i) => {
                                    const isConnected = connections.some(c => c.leftIndex === i);
                                    const isActive = activeLeft === i;
                                    let btnClass = "h-[60px] w-full border-2 rounded-xl flex items-center justify-center transition-all cursor-pointer bg-white ";
                                    if (submitted) {
                                        const conn = connections.find(c => c.leftIndex === i);
                                        btnClass += conn ? (isCorrect(conn.leftIndex, conn.rightIndex) ? "border-green-400" : "border-red-400") : "border-gray-200 opacity-50";
                                    } else {
                                        btnClass += isActive ? "border-blue-500 shadow-md scale-[1.02]" : isConnected ? "border-gray-300 bg-gray-50" : "border-gray-200 hover:border-blue-300";
                                    }
                                    return (
                                        <div key={`l-${i}`} className="h-[60px] flex items-center justify-end pr-4">
                                            <div onClick={() => handleLeftClick(i)} className={btnClass}>
                                                <svg viewBox="0 0 100 50" className="w-20 h-10">{item.svg}</svg>
                                            </div>
                                            <div className={`w-3 h-3 rounded-full ml-3 flex-shrink-0 transition-all ${isActive ? 'bg-blue-500 scale-150' : isConnected ? (submitted ? (isCorrect(i, connections.find(c => c.leftIndex === i).rightIndex) ? 'bg-green-500' : 'bg-red-500') : 'bg-gray-500') : 'bg-gray-300'}`}></div>
                                        </div>
                                    );
                                })}
                            </div>
                            
                            {/* SVG Lines */}
                            <div className="w-[30%] h-full relative z-0">
                                <svg viewBox="0 0 100 720" preserveAspectRatio="none" className="w-full h-full absolute inset-0">
                                    {connections.map((conn, idx) => {
                                        const y1 = conn.leftIndex * (720 / 10) + (720 / 20); // Center of row
                                        const y2 = conn.rightIndex * (720 / 10) + (720 / 20);
                                        const isCorr = isCorrect(conn.leftIndex, conn.rightIndex);
                                        const color = submitted ? (isCorr ? '#22c55e' : '#ef4444') : '#94a3b8';
                                        const strokeW = submitted && !isCorr ? 2 : 3;
                                        const dash = submitted && !isCorr ? "4 4" : "none";
                                        return <line key={`line-${idx}`} x1="0" y1={y1} x2="100" y2={y2} stroke={color} strokeWidth={strokeW} strokeDasharray={dash} />;
                                    })}
                                </svg>
                            </div>

                            {/* Right Column */}
                            <div className="w-[35%] flex flex-col justify-between h-full z-10">
                                {rightItems.map((item, j) => {
                                    const isConnected = connections.some(c => c.rightIndex === j);
                                    const isActive = activeRight === j;
                                    let btnClass = "h-[60px] w-full border-2 rounded-xl flex items-center justify-center font-bold text-sm transition-all cursor-pointer bg-white px-2 text-center ";
                                    if (submitted) {
                                        const conn = connections.find(c => c.rightIndex === j);
                                        btnClass += conn ? (isCorrect(conn.leftIndex, j) ? "border-green-400 text-green-700 bg-green-50" : "border-red-400 text-red-700 bg-red-50") : "border-gray-200 text-gray-400 opacity-50";
                                    } else {
                                        btnClass += isActive ? "border-blue-500 text-blue-700 shadow-md scale-[1.02]" : isConnected ? "border-gray-300 text-gray-500 bg-gray-50" : "border-gray-200 text-gray-700 hover:border-blue-300";
                                    }
                                    return (
                                        <div key={`r-${j}`} className="h-[60px] flex items-center justify-start pl-4">
                                            <div className={`w-3 h-3 rounded-full mr-3 flex-shrink-0 transition-all ${isActive ? 'bg-blue-500 scale-150' : isConnected ? (submitted ? (isCorrect(connections.find(c => c.rightIndex === j).leftIndex, j) ? 'bg-green-500' : 'bg-red-500') : 'bg-gray-500') : 'bg-gray-300'}`}></div>
                                            <div onClick={() => handleRightClick(j)} className={btnClass}>
                                                {item.label}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>

                    <div className="mt-6 flex justify-center">
                        {!submitted ? (
                            <button onClick={checkResults} disabled={connections.length === 0} className="px-8 py-3 bg-blue-600 text-white font-bold rounded-xl shadow-md disabled:bg-gray-300 disabled:cursor-not-allowed hover:bg-blue-700 transition-all">Kiểm tra kết quả</button>
                        ) : (
                            <div className="text-center">
                                <p className="text-lg font-bold mb-2">Bạn nối đúng: <span className={score === items.length ? "text-green-600" : "text-amber-500"}>{score}/{items.length}</span></p>

                                    <tr><td className="p-4 font-medium text-slate-700">Điện trở</td><td className="p-4 flex justify-center"><svg className="w-24 h-12" viewBox="0 0 100 50"><line x1="10" y1="25" x2="25" y2="25" stroke="#334155" strokeWidth="2"/><rect x="25" y="15" width="50" height="20" fill="none" stroke="#334155" strokeWidth="2"/><line x1="75" y1="25" x2="90" y2="25" stroke="#334155" strokeWidth="2"/></svg></td></tr>
                                    <tr><td className="p-4 font-medium text-slate-700">Ampe kế</td><td className="p-4 flex justify-center"><svg className="w-24 h-12" viewBox="0 0 100 50"><line x1="10" y1="25" x2="35" y2="25" stroke="#334155" strokeWidth="2"/><circle cx="50" cy="25" r="15" fill="none" stroke="#334155" strokeWidth="2"/><text x="50" y="30" fill="#334155" fontSize="14" fontWeight="bold" textAnchor="middle">A</text><line x1="65" y1="25" x2="90" y2="25" stroke="#334155" strokeWidth="2"/><text x="25" y="15" fill="#ef4444" fontSize="14" fontWeight="bold">+</text><text x="75" y="15" fill="#3b82f6" fontSize="14" fontWeight="bold">-</text></svg></td></tr>
                                    <tr><td className="p-4 font-medium text-slate-700">Vôn kế</td><td className="p-4 flex justify-center"><svg className="w-24 h-12" viewBox="0 0 100 50"><line x1="10" y1="25" x2="35" y2="25" stroke="#334155" strokeWidth="2"/><circle cx="50" cy="25" r="15" fill="none" stroke="#334155" strokeWidth="2"/><text x="50" y="30" fill="#334155" fontSize="14" fontWeight="bold" textAnchor="middle">V</text><line x1="65" y1="25" x2="90" y2="25" stroke="#334155" strokeWidth="2"/><text x="25" y="15" fill="#ef4444" fontSize="14" fontWeight="bold">+</text><text x="75" y="15" fill="#3b82f6" fontSize="14" fontWeight="bold">-</text></svg></td></tr>
                                    <tr><td className="p-4 font-medium text-slate-700">Điôt phát quang (Đèn LED)</td><td className="p-4 flex justify-center"><svg className="w-24 h-12" viewBox="0 0 100 50"><line x1="10" y1="30" x2="35" y2="30" stroke="#334155" strokeWidth="2"/><polygon points="35,20 35,40 55,30" fill="none" stroke="#334155" strokeWidth="2"/><line x1="55" y1="20" x2="55" y2="40" stroke="#334155" strokeWidth="2"/><line x1="55" y1="30" x2="80" y2="30" stroke="#334155" strokeWidth="2"/><line x1="45" y1="15" x2="55" y2="5" stroke="#334155" strokeWidth="2"/><polygon points="55,5 50,7 53,10" fill="#334155"/><line x1="55" y1="20" x2="65" y2="10" stroke="#334155" strokeWidth="2"/><polygon points="65,10 60,12 63,15" fill="#334155"/></svg></td></tr>
                                    <tr><td className="p-4 font-medium text-slate-700">Chuông điện</td><td className="p-4 flex justify-center"><svg className="w-24 h-12" viewBox="0 0 100 50"><line x1="10" y1="25" x2="35" y2="25" stroke="#334155" strokeWidth="2"/><path d="M 35 25 Q 35 10 50 10 Q 65 10 65 25 Z" fill="none" stroke="#334155" strokeWidth="2"/><line x1="35" y1="25" x2="65" y2="25" stroke="#334155" strokeWidth="2"/><circle cx="50" cy="25" r="2" fill="#334155"/><line x1="65" y1="25" x2="90" y2="25" stroke="#334155" strokeWidth="2"/></svg></td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                        <h2 className="text-xl font-bold text-blue-900 mb-4 border-b pb-2 flex items-center gap-2">
                            <span className="bg-blue-100 text-blue-600 w-8 h-8 rounded-lg flex items-center justify-center">2</span> Quy ước Chiều dòng điện
                        </h2>
                        <div className="bg-blue-50 border-l-4 border-blue-500 p-5 text-blue-900 text-lg rounded-r-xl shadow-sm leading-relaxed mb-4">
                            Chiều dòng điện trong mạch điện kín được quy ước là chiều đi từ <b>cực dương (+)</b> của nguồn điện, qua dây nối và thiết bị tiêu thụ, tới <b>cực âm (-)</b> của nguồn điện.
                        </div>
                        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/cd/Electric_current_vs_electron_flow.svg/800px-Electric_current_vs_electron_flow.svg.png" alt="Mô phỏng chiều dòng điện" className="rounded-xl border border-slate-200 shadow-sm mx-auto max-w-full h-auto" />
                        <p className="text-center text-sm text-slate-500 mt-2 italic">Lưu ý: Dòng điện quy ước chạy ngược chiều với sự dịch chuyển của electron tự do.</p>
                    </div>
                </div>
            );

            const renderLab = () => (
                <div className="animate-fade-in pb-10">
                    <div className="mb-6">
                        <h2 className="text-2xl font-bold text-gray-800">Phòng Thực hành Ảo</h2>
                        <p className="text-gray-500">Khu vực tương tác lắp ráp và nhận diện trực quan.</p>
                    </div>
                    <MatchingGame />
                    <DragDropLab />
                    <InteractiveCircuit />
                    <VirtualLab22_2 />
                    <VirtualLab22_3 />
                    <TroubleshootingLab />
                </div>
            );

            const renderQuiz = () => (
                <div className="space-y-6 max-w-2xl mx-auto animate-fade-in pb-10">
                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                        <div className="flex items-center justify-between mb-6">
                            <h2 className="text-xl font-bold text-gray-800 flex items-center gap-2"><Icon name="check-square" className="text-indigo-500"/> Trắc nghiệm ({lessonData.quiz.length} câu)</h2>
                            <span className="text-sm bg-blue-100 text-blue-700 px-3 py-1 rounded-full font-medium">Đã làm: {Object.keys(userAnswers).length}/{lessonData.quiz.length}</span>
                        </div>
                        <div className="space-y-8">
                            {lessonData.quiz.map((q, index) => (
                                <div key={q.id} className="border-b border-gray-100 pb-6 last:border-0 last:pb-0">
                                    <p className="font-semibold text-gray-800 mb-3 flex gap-2"><span className="text-blue-600 font-bold min-w-[24px]">#{index + 1}.</span> {q.question}</p>
                                    <div className="grid grid-cols-1 gap-2 pl-8">
                                        {q.options.map((opt, i) => {
                                            let btnClass = "text-left px-4 py-3 rounded-xl border-2 transition-all text-sm relative overflow-hidden ";
                                            if (showQuizResult) {
                                                if (i === q.correct) btnClass += "bg-green-50 border-green-500 text-green-800 font-bold";
                                                else if (userAnswers[q.id] === i && i !== q.correct) btnClass += "bg-red-50 border-red-500 text-red-800 opacity-60";
                                                else btnClass += "bg-gray-50 border-gray-100 opacity-40";
                                            } else {
                                                btnClass += userAnswers[q.id] === i ? "bg-blue-50 border-blue-500 text-blue-900 shadow-sm" : "bg-white border-gray-200 hover:bg-gray-50 hover:border-blue-300";
                                            }
                                            return (
                                                <button key={i} onClick={() => handleQuizSelect(q.id, i)} className={btnClass} disabled={showQuizResult}>
                                                    {opt}
                                                    {showQuizResult && i === q.correct && <Icon name="check-circle" className="absolute right-3 top-1/2 -translate-y-1/2 text-green-600" size={18} />}
                                                </button>
                                            );
                                        })}
                                    </div>
                                    {showQuizResult && (
                                        <div className={`mt-3 pl-8 text-sm font-medium ${userAnswers[q.id] === q.correct ? 'text-green-600' : 'text-rose-600'}`}>
                                            <strong>Giải thích:</strong> {q.explain}
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>
                        <div className="mt-8 pt-6 border-t bg-white sticky bottom-0 z-10">
                            {!showQuizResult ? (
                                <button onClick={submitQuiz} disabled={Object.keys(userAnswers).length < lessonData.quiz.length} className="w-full py-3 bg-blue-600 text-white rounded-xl font-bold text-lg shadow-lg disabled:bg-gray-300 disabled:cursor-not-allowed hover:bg-blue-700 transition-all">Nộp bài</button>
                            ) : (
                                <div className="bg-gray-50 p-4 rounded-xl flex items-center justify-between">
                                    <div>
                                        <div className="text-xs text-gray-500 uppercase font-bold">Kết quả của bạn</div>
                                        <div className="text-2xl font-bold flex items-baseline gap-1"><span className={quizScore === lessonData.quiz.length ? "text-green-600" : "text-amber-500"}>{quizScore}</span><span className="text-gray-400 text-lg">/{lessonData.quiz.length}</span></div>
                                    </div>
                                    <button onClick={resetQuiz} className="flex items-center gap-2 px-6 py-3 bg-white border border-gray-300 hover:bg-gray-100 rounded-xl font-bold"><Icon name="refresh-cw" size={18} /> Làm lại</button>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );

            const renderExercise = () => (
                <div className="space-y-6 animate-fade-in pb-10">
                    <div className="bg-orange-50 p-4 rounded-xl border border-orange-200 text-orange-800 text-sm mb-4 flex items-center gap-2">
                        <Icon name="alert-circle" size={20} /> Suy luận từ thực tế và liên kết với bài học nhé!
                    </div>
                    {lessonData.advancedExercises.map((ex) => (
                        <div key={ex.id} className="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                            <div className="flex justify-between items-start mb-4"><div className="flex items-center gap-2"><span className="bg-gray-800 text-white text-xs font-bold px-2 py-1 rounded">Vận dụng {ex.id}</span></div></div>
                            <p className="text-gray-700 mb-6 font-medium text-lg border-l-4 border-blue-500 pl-4">{ex.question}</p>
                            <div className="space-y-4">
                                <div className="bg-yellow-50 p-4 rounded-xl border border-yellow-100 text-sm text-gray-700 flex gap-3"><Icon name="lightbulb" className="text-yellow-500 flex-shrink-0" size={20} /><div><strong className="block text-yellow-700 mb-1">Gợi ý:</strong> {ex.hint}</div></div>
                                <button onClick={() => setOpenExerciseId(openExerciseId === ex.id ? null : ex.id)} className="text-blue-600 font-bold text-sm hover:text-blue-800 flex items-center gap-2 py-2">{openExerciseId === ex.id ? "Ẩn đáp án" : "Xem lời giải chi tiết"} <span className={`transform transition-transform ${openExerciseId === ex.id ? 'rotate-180' : ''}`}>▼</span></button>
                                {openExerciseId === ex.id && (
                                    <div className="p-5 bg-emerald-50 rounded-xl border border-emerald-100 text-gray-800 text-sm whitespace-pre-line animate-fade-in">
                                        <div className="font-bold text-emerald-700 mb-3 flex items-center gap-2 border-b border-emerald-200 pb-2"><Icon name="book-open" size={16}/> Lời giải tham khảo:</div>
                                        {ex.details}
                                        {ex.svg && ex.svg}
                                        <div className="mt-4 pt-3 border-t border-emerald-200 font-bold text-emerald-800 flex justify-between items-center"><span>Đáp án:</span><span className="bg-white px-3 py-1 rounded border border-emerald-200 shadow-sm">{ex.answer}</span></div>
                                    </div>
                                )}
                            </div>
                        </div>
                    ))}
                </div>
            );

            return (
                <div className="min-h-screen bg-gray-50 font-sans text-gray-800 pb-20 selection:bg-blue-100">
                    <header className="bg-gradient-to-r from-blue-700 to-indigo-800 text-white p-4 shadow-lg sticky top-0 z-50">
                        <div className="max-w-4xl mx-auto flex items-center justify-between">
                            <div><h1 className="text-xl md:text-2xl font-bold flex items-center gap-2"><Icon name="zap" fill="white" className="text-white opacity-20"/> KHTN 8</h1><p className="text-xs text-blue-200 opacity-90 font-medium tracking-wide">{lessonData.title}</p></div>
                            <div className="text-right hidden sm:block"><div className="bg-white/10 backdrop-blur-sm px-3 py-1 rounded-lg text-xs font-mono border border-white/10">GV: {lessonData.teacher}</div></div>
                        </div>
                    </header>
                    <nav className="bg-white shadow-sm border-b sticky top-[72px] z-40 overflow-x-auto hide-scrollbar">
                        <div className="max-w-4xl mx-auto flex px-2 gap-2 py-2">
                            {[
                                { id: 'intro', label: '1. Khởi động' },
                                { id: 'theory', label: '2. Kiến thức' },
                                { id: 'lab', label: '3. Thực hành' },
                                { id: 'quiz', label: '4. Luyện tập' },
                                { id: 'exercise', label: '5. Vận dụng' },
                            ].map((item) => (
                                <button key={item.id} onClick={() => setCurrentSection(item.id)} className={`flex-1 min-w-[100px] py-2.5 px-3 rounded-lg text-sm font-bold transition-all whitespace-nowrap ${currentSection === item.id ? 'bg-blue-100 text-blue-700 shadow-inner' : 'text-gray-500 hover:bg-gray-100 hover:text-gray-700'}`}>{item.label}</button>
                            ))}
                        </div>
                    </nav>
                    <main className="max-w-3xl mx-auto p-4 md:p-6 mt-4">
                        {currentSection === 'intro' && renderIntro()}
                        {currentSection === 'theory' && renderTheory()}
                        {currentSection === 'lab' && renderLab()}
                        {currentSection === 'quiz' && renderQuiz()}
                        {currentSection === 'exercise' && renderExercise()}
                    </main>
                    <footer className="max-w-4xl mx-auto p-6 text-center text-sm text-gray-400">
                        <p>© Hệ thống Bài giảng Tương tác KHTN 8</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ScienceLessonApp />);
    </script>
</body>
</html>
